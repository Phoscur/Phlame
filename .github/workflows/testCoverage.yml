name: Lint & Test with coverage (vitest)

on:
  push:
  workflow_dispatch:
  pull_request:

jobs:
  # Fail-fast lint gate: oxlint runs in seconds with no install step, so a lint
  # regression surfaces almost immediately — well before the slower test job below
  # finishes. Pinned version + --deny-warnings keeps it identical to local `oxlint`.
  oxlint:
    name: Lint (fast fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx --yes oxlint@1.72.0 --deny-warnings
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    name: Test & Typecheck
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm install
      - name: Typecheck - TSC
        run: npm run tsc
      - name: ESLint
        run: npm run lint
      - name: Unit tests with coverage (app + engine) - Vitest
        run: npm run coverage
        env:
          CI: true
